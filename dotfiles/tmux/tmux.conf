IS_VIM='ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$"'
RESIZE_STEP_X=10
RESIZE_STEP_Y=5

source ~/.config/tmux/theme.tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'

set-environment -g FZF_DEFAULT_OPTS \
  "--color=gutter:-1"

set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|lumen)(diff)?(-wrapped)?'
set -g @resurrect-capture-pane-contents 'on'
set -g mouse on
set -g prefix c-space
set -g base-index 1
set -g pane-base-index 1
set -g pane-border-status "off"
set -g pane-border-style fg="#{foreground_secondary}"
set -g pane-active-border-style fg="#{foreground_secondary}"
set -g mode-style "fg=#{foreground_focused},bg=#{background_focused}"
set -g status-position bottom
set -g status-justify centre
set -g status-left "#(if [ #{client_prefix} -eq 1 ]; then echo '#[bg=#{background_focused},fg=#{foreground_focused}] TMUX #[default] '; fi)#{?SSH_CONNECTION,[#H] ,}#S#(~/.config.jmmm.sh/bin/git-dirty check '#{pane_current_path}' >/dev/null 2>&1; ~/.config.jmmm.sh/bin/git-dirty read '#{pane_current_path}') "
set -g status-left-length 100
set -g status-interval 1
set -g status-right "%d %B %H:%M"
set -g status-style "fg=#{foreground_secondary},bg=#{background}"
set -g window-status-style "fg=#{foreground_secondary}"
set -g window-status-current-style "bg=#{background_focused},fg=#{foreground_focused}"
set -g window-status-format "#I:#W"
set -g window-status-current-format "#I:#W"
set -g message-style "fg=#{foreground_focused},bg=#{background_focused}"
set -g copy-mode-match-style "fg=#{foreground_focused},bg=#{background_focused}"
set -g copy-mode-current-match-style "fg=#{foreground_focused},bg=#{background_focused}"
set -sa terminal-overrides ",xterm*:Tc"
set -g renumber-windows on
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u
set -sg escape-time 10
set -g default-shell /bin/bash
set -g default-command "bash -i"

setw -g pane-base-index 1
setw -g mode-keys vi

set-hook -g session-created 'if-shell "echo \"#{pane_current_path}\" | grep -q \"^$HOME/lab/\"" "send-keys \"nv\" enter; new-window -c \"#{pane_current_path}\""'



unbind C-s
unbind C-b
unbind L
unbind y
unbind Y
unbind K
unbind k
unbind c

bind l switch-client -l
bind C-Space send-prefix
bind & kill-window
bind x kill-pane
bind r source-file ~/.config/tmux/tmux.conf
bind c new-window -a
bind C new-window -b
bind q kill-session
bind -n M-Tab last-window
bind -n M-H previous-window
bind -n M-L next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind N command-prompt -p "Enter repo (owner/repo or URL): " "run-shell '~/.config.jmmm.sh/bin/sourcer \"%1\"'"
bind n command-prompt -p "Enter new lab name: " \
  "run-shell 'mkdir -p $HOME/lab/%1 && \
   tmux new-session -d -s %1 -c $HOME/lab/%1 && \
   tmux rename-window -t %1:0 code && \
   tmux send-keys -t %1:0 nvim C-m && \
   tmux new-window -t %1 -c $HOME/lab/%1 -n shell; \
   exit 0' \; switch-client -t %1"
bind a new-window -a -n "oc" "opencode"
bind A new-window -b -n "oc" "opencode"
bind j display-popup -E "nvim $HOME/lab/journal.jmmm.sh/index.md"
bind t if-shell -F "#{?#{==:#(~/.config.jmmm.sh/bin/git-dirty read '#{pane_current_path}'),},0,1}" "display-popup -b none -w 85% -h 85% -E \"tuicr -w\"" "display-popup -b none -w 85% -h 85% -E tuicr"
bind g display-popup -b none -w 85% -h 85% -E "lazygit"
bind s display-popup -b none -w 100% -h 100% -E "$HOME/lab/ramo/target/release/ramo --auto-close"
bind C-s display-popup -b none -w 100% -h 100% -E "$HOME/lab/ramo/target/release/ramo --auto-close"
bind -T root MouseDown1StatusLeft display-popup -w 100% -h 100% -b none -E "$HOME/lab/ramo/target/release/ramo --auto-close"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n C-M-h if-shell "$IS_VIM" "send-keys C-M-h" "resize-pane -L $RESIZE_STEP_X"
bind -n C-M-l if-shell "$IS_VIM" "send-keys C-M-l" "resize-pane -R $RESIZE_STEP_X"
bind -n C-M-k if-shell "$IS_VIM" "send-keys C-M-k" "resize-pane -U $RESIZE_STEP_Y"
bind -n C-M-j if-shell "$IS_VIM" "send-keys C-M-j" "resize-pane -D $RESIZE_STEP_Y"
bind v copy-mode
bind -T copy-mode-vi i send-keys -X cancel
bind -n F12 set -g status
bind y run-shell -b "~/.config.jmmm.sh/bin/tmux-copy-pane"
bind Y run-shell -b "~/.config.jmmm.sh/bin/tmux-copy-all-panes"

set -s command-alias[99] k='kill-session ; display "Session killed"'
set -s command-alias[98] K='run-shell "tmux kill-session -a" ; display "All sessions killed"'
