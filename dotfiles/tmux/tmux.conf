IS_VIM='ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$"'
RESIZE_STEP_X=10
RESIZE_STEP_Y=5

gray_light="#666666"
gray_dark="#111111"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'joaomendoncaa/mxsh'
run-shell "$HOME/lab/mxsh/mxsh.tmux"

set-environment -g FZF_DEFAULT_OPTS \
  "--color=gutter:-1"

set -g @mxsh-path "~/lab/*:~/.config.jmmm.sh"
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '3'
set -g mouse on
set -g prefix c-space
set -g base-index 1
set -g pane-base-index 1
set -g pane-border-style fg="${gray_dark}"
set -g pane-border-status "off"
set -g pane-active-border-style fg="${gray_dark}"
set -g mode-style "fg=black,bg=white"
set -g status-position bottom
set -g status-justify centre
set -g status-left "#(if [ #{client_prefix} -eq 1 ]; then echo '#[bg=white,fg=black] TMUX #[default] '; fi)#{?SSH_CONNECTION,[#H] ,}#S "
set -g status-left-length 100
set -g status-right "%d %B %H:%M"
set -g status-style "fg=${gray_light},bg=default"
set -g window-status-style "fg=${gray_light}"
set -g window-status-current-style "bg=white,fg=black"
set -g window-status-format "#I:#W"
set -g window-status-current-format "#I:#W"
set -g message-style "fg=black,bg=white"
set -g copy-mode-match-style "fg=black,bg=white"
set -g copy-mode-current-match-style "fg=black,bg=white"
set -sa terminal-overrides ",xterm*:Tc"
set -g renumber-windows on
set -g detach-on-destroy off
set -g default-shell /bin/bash
set -g default-command "bash -i"

setw -g pane-base-index 1
setw -g mode-keys vi

set-hook -g session-created 'if-shell "echo \"#{pane_current_path}\" | grep -q \"^$home/lab/\"" "send-keys \"nv\" enter; new-window -c \"#{pane_current_path}\""'

unbind C-b
unbind L
unbind y
unbind Y
unbind K
unbind k
unbind c

bind l switch-client -l
bind C-Space send-prefix
bind & kill-window \; display "Window killed"
bind x kill-pane \; display "Pane killed"
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind c new-window -a
bind C new-window -b
bind -n M-H previous-window
bind -n M-L next-window
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind g command-prompt -p "Enter repo (owner/repo or URL): " "run-shell '~/.config.jmmm.sh/bin/sourcer \"%1\"'"
bind G command-prompt -p "Enter new lab name: " \
  "run-shell 'mkdir -p $HOME/lab/%1 && \
   tmux new-session -d -s %1 -c $HOME/lab/%1 && \
   tmux rename-window -t %1:0 code && \
   tmux send-keys -t %1:0 nvim C-m && \
   tmux new-window -t %1 -c $HOME/lab/%1 -n shell; \
   exit 0' \; switch-client -t %1"
bind a new-window -a -n "oc" "opencode --continue"
bind A new-window -b -n "oc" "opencode --continue"
bind j display-popup -E "nvim $HOME/lab/journal.jmmm.sh/index.md"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n C-M-h if-shell "$IS_VIM" "send-keys C-M-h" "resize-pane -L $RESIZE_STEP_X"
bind -n C-M-l if-shell "$IS_VIM" "send-keys C-M-l" "resize-pane -R $RESIZE_STEP_X"
bind -n C-M-k if-shell "$IS_VIM" "send-keys C-M-k" "resize-pane -U $RESIZE_STEP_Y"
bind -n C-M-j if-shell "$IS_VIM" "send-keys C-M-j" "resize-pane -D $RESIZE_STEP_Y"
bind v copy-mode
bind -T copy-mode-vi i send-keys -X cancel
bind -n F12 set -g status
bind y run-shell -b "~/.config.jmmm.sh/bin/tmux-copy-pane"
bind Y run-shell -b "~/.config.jmmm.sh/bin/tmux-copy-all-panes"

set -s command-alias[99] sk='kill-session ; display "Session killed"'
set -s command-alias[98] sK='run-shell "tmux kill-session -a" ; display "All sessions killed"'

run '~/.tmux/plugins/tpm/tpm'
